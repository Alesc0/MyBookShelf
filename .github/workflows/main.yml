name: Build iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          swift --version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prebuild iOS
        run: bunx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Read app name from app.json
        id: appname
        run: |
          APP_NAME=$(jq -r .expo.slug app.json)
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild \
            -workspace ios/${{ env.APP_NAME }}.xcworkspace \
            -scheme ${{ env.APP_NAME }} \
            -configuration Release clean archive \
            -destination 'generic/platform=iOS' \
            -archivePath build/${{ env.APP_NAME }}.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export IPA
        run: |
          cd build/${{ env.APP_NAME }}.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r ${{ env.APP_NAME }}.ipa Payload
          mv ${{ env.APP_NAME }}.ipa $GITHUB_WORKSPACE/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-ipa
          path: ${{ env.APP_NAME }}.ipa
